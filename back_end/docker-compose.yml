name: school_clubs_management_system

services:
  db:
    image: postgres:18
    container_name: school-clubs-management-system-db
    ports:
      - '${DB_PORT}:5432'
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USER_NAME}
    volumes:
      - ~/.school_clubs_management_system_db_data/:/var/lib/postgresql/18/data/
    restart: unless-stopped

  minio:
    image: tawfiqak/school-clubs-management-systme-minio-server:latest
    container_name: school-clubs-management-system-minio-server
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_USER_NAME}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - ~/.school_clubs_management_system_minio_data/:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
